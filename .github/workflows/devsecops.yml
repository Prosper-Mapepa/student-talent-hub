name: DevSecOps Pipeline

on:
  push:
    branches: [main, master, develop, devsecops/ci-pipeline]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  BACKEND_IMAGE: veritalent-backend:ci
  FRONTEND_IMAGE: veritalent-frontend:ci
  # Trivy HIGH = CVSS 7.0–8.9, CRITICAL = 9.0–10.0
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  # ---------------------------------------------------------------------------
  # 1. Secret detection — TruffleHog
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.repository.default_branch }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --only-verified

  # ---------------------------------------------------------------------------
  # 2. SAST — Trivy filesystem scan (dependencies + misconfigs)
  # ---------------------------------------------------------------------------
  sast-filesystem:
    name: SAST (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-fs.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ---------------------------------------------------------------------------
  # 3. SCA — Software Bill of Materials (SBOM)
  # ---------------------------------------------------------------------------
  sbom:
    name: SCA / SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate CycloneDX SBOM (repo)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom-repo.cyclonedx.json

      - name: Generate SPDX SBOM (backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./backend
          format: spdx-json
          output: sbom-backend.spdx.json

      - name: Generate SPDX SBOM (frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: spdx-json
          output: sbom-frontend.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-repo.cyclonedx.json
            sbom-backend.spdx.json
            sbom-frontend.spdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 4. Build Docker images
  # ---------------------------------------------------------------------------
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 5. Container scan — Trivy (fail if CVSS >= 7.0)
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          format: table

  # ---------------------------------------------------------------------------
  # 6. DAST — OWASP ZAP baseline against running stack
  # ---------------------------------------------------------------------------
  dast-zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start CI application stack
        run: docker compose -f docker-compose.ci.yml up -d --build --wait

      - name: Verify services are reachable
        run: |
          curl -fsS http://localhost:3001/ >/dev/null
          curl -fsS http://localhost:3000/ >/dev/null

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3000
          fail_action: true
          allow_issue_writing: false
          cmd_options: -a

      - name: Tear down CI stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # ---------------------------------------------------------------------------
  # Gate — all security jobs must pass
  # ---------------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - sast-filesystem
      - sbom
      - container-scan
      - dast-zap
    steps:
      - name: All security checks passed
        run: echo "DevSecOps pipeline passed — no critical vulnerabilities detected."
