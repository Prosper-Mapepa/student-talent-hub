name: DevSecOps Pipeline

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
      - '.github/workflows/devsecops.yml'
      - 'docker-compose.ci.yml'
      - '.gitmodules'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'mobile/**'
      - '.github/workflows/devsecops.yml'
      - 'docker-compose.ci.yml'
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  BACKEND_IMAGE: veritalent-backend:ci
  FRONTEND_IMAGE: veritalent-frontend:ci
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_SKIP_DIRS: node_modules,.next,dist,.expo,web-build

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            mobile:
              - 'mobile/**'

  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  sast-backend:
    name: SAST — Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          format: sarif
          output: trivy-fs-backend.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs-backend.sarif
          category: trivy-backend

  sast-frontend:
    name: SAST — Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./frontend
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          format: sarif
          output: trivy-fs-frontend.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs-frontend.sarif
          category: trivy-frontend

  sast-mobile:
    name: SAST — Mobile
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./mobile
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          format: sarif
          output: trivy-fs-mobile.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs-mobile.sarif
          category: trivy-mobile

  sbom:
    name: SCA / SBOM Generation
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.mobile == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: SBOM — backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./backend
          format: spdx-json
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          output: sbom-backend.spdx.json

      - name: SBOM — frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: spdx-json
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          output: sbom-frontend.spdx.json

      - name: SBOM — mobile
        if: needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./mobile
          format: spdx-json
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          output: sbom-mobile.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: sbom-*.spdx.json
          if-no-files-found: warn
          retention-days: 30

  mobile-check:
    name: Mobile (Typecheck)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npm run typecheck
        continue-on-error: true

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.BACKEND_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [changes, build-images]
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build & scan backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Trivy scan — backend
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Build & scan frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001

      - name: Trivy scan — frontend
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          format: table

  dast-zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [changes, build-images]
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start CI stack
        run: docker compose -f docker-compose.ci.yml up -d --build --wait

      - name: Verify services
        run: |
          curl -fsS http://localhost:3001/ >/dev/null
          curl -fsS http://localhost:3000/ >/dev/null

      - uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3000
          fail_action: true
          allow_issue_writing: false
          cmd_options: -a

      - name: Tear down CI stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - sast-backend
      - sast-frontend
      - sast-mobile
      - sbom
      - mobile-check
      - container-scan
      - dast-zap
    if: always()
    steps:
      - name: All security checks passed
        if: |
          !contains(needs.*.result, 'failure') &&
          !contains(needs.*.result, 'cancelled')
        run: echo "DevSecOps pipeline passed."

      - name: Security gate failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more security jobs failed."
          exit 1
